<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TradeJournal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-primary);
        }
        .auth-page-container {
            width: 100%;
            max-width: 420px;
        }
        .auth-page-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-page-logo .logo {
            justify-content: center;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .auth-page-logo .logo-icon {
            width: 32px;
            height: 32px;
            color: var(--accent-primary);
        }
        .auth-page-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 32px;
        }
        .auth-page-card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
        .auth-page-card .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
            text-align: center;
        }
        .auth-page-card .form-group {
            margin-bottom: 16px;
        }
        .auth-page-card .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .auth-page-card .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .auth-page-card .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .auth-page-card .btn-full {
            width: 100%;
            justify-content: center;
            padding: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .auth-page-card .auth-switch {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .auth-page-card .auth-switch p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .link-btn {
            background: none;
            border: none;
            color: var(--accent-primary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0;
            margin-left: 4px;
        }
        .link-btn:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
        .form-error {
            color: var(--accent-danger);
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
        }
        .form-error.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-page-container">
            <div class="auth-page-logo">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22,7 13.5,15.5 8.5,10.5 2,17"></polyline>
                        <polyline points="16,7 22,7 22,13"></polyline>
                    </svg>
                    <span>TradeJournal</span>
                </div>

            <div class="auth-page-card">
                <!-- Login Form -->
                <div id="loginForm">
                    <h2>Welcome Back</h2>
                    <p class="auth-subtitle">Sign in to access your trading journal</p>
                    <form id="loginFormSubmit">
                        <div class="form-group">
                            <label for="loginEmail">Email</label>
                            <input type="email" id="loginEmail" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        </div>
                        <div class="form-error" id="loginError"></div>
                        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
                    </form>
                    <div class="auth-switch">
                        <p>Don't have an account? <button type="button" class="link-btn" id="showRegister">Create Account</button></p>
                    </div>

                <!-- Register Form -->
                <div id="registerForm" style="display: none;">
                    <h2>Create Account</h2>
                    <p class="auth-subtitle">Start tracking your trades today</p>
                    <form id="registerFormSubmit">
                        <div class="form-group">
                            <label for="registerUsername">Username</label>
                            <input type="text" id="registerUsername" placeholder="Choose a username" required>
                        </div>
                        <div class="form-group">
                            <label for="registerEmail">Email</label>
                            <input type="email" id="registerEmail" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Password</label>
                            <input type="password" id="registerPassword" placeholder="Create a password (min 6 chars)" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="registerConfirmPassword">Confirm Password</label>
                            <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required>
                        </div>
                        <div class="form-error" id="registerError"></div>
                        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
                    </form>
                    <div class="auth-switch">
                        <p>Already have an account? <button type="button" class="link-btn" id="showLogin">Sign In</button></p>
                    </div>
            </div>
    </div>

    <script>
        // Check if already logged in
        var user = localStorage.getItem('tradingJournalUser');
        if (user) {
            window.location.href = 'index.html';
        }

        // Auth functions
        var showRegister = document.getElementById('showRegister');
        var showLogin = document.getElementById('showLogin');
        var loginFormSubmit = document.getElementById('loginFormSubmit');
        var registerFormSubmit = document.getElementById('registerFormSubmit');

        showRegister.addEventListener('click', function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            clearAuthErrors();
        });

        showLogin.addEventListener('click', function() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            clearAuthErrors();
        });

        function clearAuthErrors() {
            document.getElementById('loginError').textContent = '';
            document.getElementById('loginError').classList.remove('active');
            document.getElementById('registerError').textContent = '';
            document.getElementById('registerError').classList.remove('active');
        }

        function showError(elementId, message) {
            var errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.classList.add('active');
        }

        // Handle login
        loginFormSubmit.addEventListener('submit', function(e) {
            e.preventDefault();
            clearAuthErrors();

            var email = document.getElementById('loginEmail').value.trim().toLowerCase();
            var password = document.getElementById('loginPassword').value;

            var users = JSON.parse(localStorage.getItem('tradingJournalUsers') || '[]');
            var user = users.find(function(u) { return u.email === email && u.password === password; });

            if (!user) {
                showError('loginError', 'Invalid email or password');
                return;
            }

            var currentUser = { id: user.id, username: user.username, email: user.email };
            localStorage.setItem('tradingJournalUser', JSON.stringify(currentUser));
            window.location.href = 'index.html';
        });

        // Handle register
        registerFormSubmit.addEventListener('submit', function(e) {
            e.preventDefault();
            clearAuthErrors();

            var username = document.getElementById('registerUsername').value.trim();
            var email = document.getElementById('registerEmail').value.trim().toLowerCase();
            var password = document.getElementById('registerPassword').value;
            var confirmPassword = document.getElementById('registerConfirmPassword').value;

            if (username.length < 2) {
                showError('registerError', 'Username must be at least 2 characters');
                return;
            }

            if (password.length < 6) {
                showError('registerError', 'Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('registerError', 'Passwords do not match');
                return;
            }

            var users = JSON.parse(localStorage.getItem('tradingJournalUsers') || '[]');

            if (users.some(function(u) { return u.email === email; })) {
                showError('registerError', 'Email already registered');
                return;
            }

            var newUser = {
                id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                username: username,
                email: email,
                password: password,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('tradingJournalUsers', JSON.stringify(users));

            var currentUser = { id: newUser.id, username: newUser.username, email: newUser.email };
            localStorage.setItem('tradingJournalUser', JSON.stringify(currentUser));
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
