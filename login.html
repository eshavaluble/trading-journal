<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Volubit Trading Journal</title>
    <meta name="description"
        content="Masuk ke akun Volubit Trading Journal Anda dan mulai lacak performa trading kripto Anda.">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-page-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .auth-page-logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-page-logo .logo {
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .auth-page-logo .logo-icon {
            width: 34px;
            height: 34px;
            color: var(--accent-primary);
        }

        .auth-page-logo .logo-tagline {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .auth-page-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 36px;
            box-shadow: var(--shadow-lg);
        }

        .auth-page-card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 28px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 7px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn-full {
            width: 100%;
            justify-content: center;
            padding: 13px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .auth-switch {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
        }

        .auth-switch p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .link-btn {
            background: none;
            border: none;
            color: var(--accent-primary);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            margin-left: 4px;
            transition: color 0.15s ease;
        }

        .link-btn:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .form-error {
            color: var(--accent-danger);
            font-size: 0.82rem;
            margin-top: 10px;
            display: none;
            padding: 10px 14px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-sm);
        }

        .form-error.active {
            display: block;
        }

        .form-success {
            color: var(--accent-success);
            font-size: 0.82rem;
            margin-top: 10px;
            display: none;
            padding: 10px 14px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: var(--radius-sm);
        }

        .form-success.active {
            display: block;
        }

        .auth-page-footer {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <div class="auth-page-container">
            <div class="auth-page-logo">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22,7 13.5,15.5 8.5,10.5 2,17"></polyline>
                        <polyline points="16,7 22,7 22,13"></polyline>
                    </svg>
                    <span>Volubit</span>
                </div>
                <span class="logo-tagline">Trading Journal &bull; Crypto Analytics</span>
            </div>

            <div class="auth-page-card">
                <!-- Login Form -->
                <div id="loginForm">
                    <h2>Selamat Datang 👋</h2>
                    <p class="auth-subtitle">Masuk ke akun trading journal Anda</p>
                    <form id="loginFormSubmit">
                        <div class="form-group">
                            <label for="loginEmail">Email</label>
                            <input type="email" id="loginEmail" placeholder="email@kamu.com" required
                                autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" placeholder="Masukkan password kamu" required
                                autocomplete="current-password">
                        </div>
                        <div class="form-error" id="loginError"></div>
                        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"
                                height="18">
                                <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"></path>
                                <polyline points="10,17 15,12 10,7"></polyline>
                                <line x1="15" y1="12" x2="3" y2="12"></line>
                            </svg>
                            Masuk
                        </button>
                    </form>
                    <div class="auth-switch">
                        <p>Belum punya akun? <button type="button" class="link-btn" id="showRegister">Daftar
                                sekarang</button></p>
                    </div>
                </div>

                <!-- Register Form -->
                <div id="registerForm" style="display: none;">
                    <h2>Buat Akun Baru</h2>
                    <p class="auth-subtitle">Mulai lacak trade kripto kamu hari ini</p>
                    <form id="registerFormSubmit">
                        <div class="form-group">
                            <label for="registerUsername">Username</label>
                            <input type="text" id="registerUsername" placeholder="Masukkan username kamu" required
                                autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label for="registerEmail">Email</label>
                            <input type="email" id="registerEmail" placeholder="email@kamu.com" required
                                autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Password</label>
                            <input type="password" id="registerPassword" placeholder="Min. 6 karakter" required
                                minlength="6" autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label for="registerConfirmPassword">Konfirmasi Password</label>
                            <input type="password" id="registerConfirmPassword" placeholder="Ulangi password kamu"
                                required autocomplete="new-password">
                        </div>
                        <div class="form-error" id="registerError"></div>
                        <div class="form-success" id="registerSuccess"></div>
                        <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"
                                height="18">
                                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            Buat Akun
                        </button>
                    </form>
                    <div class="auth-switch">
                        <p>Sudah punya akun? <button type="button" class="link-btn" id="showLogin">Masuk
                                sekarang</button></p>
                    </div>
                </div>
            </div>

            <p class="auth-page-footer">&copy; 2025 Volubit Trading Journal. All rights reserved.</p>
        </div>
    </div>

    <script>
        // Check if already logged in
        var user = localStorage.getItem('tradingJournalUser');
        if (user) {
            window.location.href = 'index.html';
        }

        var showRegisterBtn = document.getElementById('showRegister');
        var showLoginBtn = document.getElementById('showLogin');
        var loginFormSubmit = document.getElementById('loginFormSubmit');
        var registerFormSubmit = document.getElementById('registerFormSubmit');

        showRegisterBtn.addEventListener('click', function () {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            clearAuthErrors();
        });

        showLoginBtn.addEventListener('click', function () {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            clearAuthErrors();
        });

        function clearAuthErrors() {
            ['loginError', 'registerError', 'registerSuccess'].forEach(function (id) {
                var el = document.getElementById(id);
                if (el) { el.textContent = ''; el.classList.remove('active'); }
            });
        }

        function showError(elementId, message) {
            var errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.classList.add('active');
        }

        function showSuccess(elementId, message) {
            var el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('active');
        }

        // Handle login
        loginFormSubmit.addEventListener('submit', function (e) {
            e.preventDefault();
            clearAuthErrors();

            var email = document.getElementById('loginEmail').value.trim().toLowerCase();
            var password = document.getElementById('loginPassword').value;
            var btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.textContent = 'Memproses...';

            setTimeout(function () {
                var users = JSON.parse(localStorage.getItem('tradingJournalUsers') || '[]');
                var user = users.find(function (u) { return u.email === email && u.password === password; });

                if (!user) {
                    showError('loginError', 'Email atau password salah. Silakan coba lagi.');
                    btn.disabled = false;
                    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"></path><polyline points="10,17 15,12 10,7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg> Masuk';
                    return;
                }

                var currentUser = { id: user.id, username: user.username, email: user.email };
                localStorage.setItem('tradingJournalUser', JSON.stringify(currentUser));
                window.location.href = 'index.html';
            }, 500);
        });

        // Handle register
        registerFormSubmit.addEventListener('submit', function (e) {
            e.preventDefault();
            clearAuthErrors();

            var username = document.getElementById('registerUsername').value.trim();
            var email = document.getElementById('registerEmail').value.trim().toLowerCase();
            var password = document.getElementById('registerPassword').value;
            var confirmPassword = document.getElementById('registerConfirmPassword').value;
            var btn = document.getElementById('registerBtn');

            if (username.length < 2) {
                showError('registerError', 'Username minimal 2 karakter.');
                return;
            }
            if (password.length < 6) {
                showError('registerError', 'Password minimal 6 karakter.');
                return;
            }
            if (password !== confirmPassword) {
                showError('registerError', 'Password konfirmasi tidak cocok.');
                return;
            }

            var users = JSON.parse(localStorage.getItem('tradingJournalUsers') || '[]');
            if (users.some(function (u) { return u.email === email; })) {
                showError('registerError', 'Email sudah terdaftar. Gunakan email lain.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Membuat akun...';

            setTimeout(function () {
                var newUser = {
                    id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    username: username,
                    email: email,
                    password: password,
                    createdAt: new Date().toISOString()
                };

                users.push(newUser);
                localStorage.setItem('tradingJournalUsers', JSON.stringify(users));

                var currentUser = { id: newUser.id, username: newUser.username, email: newUser.email };
                localStorage.setItem('tradingJournalUser', JSON.stringify(currentUser));
                window.location.href = 'index.html';
            }, 600);
        });
    </script>
</body>

</html>
